databases:
  - name: dashboard-db
    plan: free
    databaseName: dashboard
    user: dashboard_user

services:
  - type: web
    name: data-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false  # Render 대시보드에서 직접 설정
      - key: DATABASE_URL
        fromDatabase:
          name: dashboard-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.6"
